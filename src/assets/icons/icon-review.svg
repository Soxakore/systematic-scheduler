<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="review_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#CC1A1A"/>
    </linearGradient>
    <radialGradient id="review_gloss" cx="32%" cy="16%" r="58%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)"/>
    </radialGradient>
    <filter id="review_shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="rgba(0,0,0,0.38)"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="44" height="44" rx="11" ry="11" fill="url(#review_bg)" filter="url(#review_shadow)"/>
  <rect x="3" y="3" width="42" height="42" rx="10" ry="10" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
  <rect x="2" y="2" width="44" height="44" rx="11" ry="11" fill="url(#review_gloss)"/>
  <!-- calendar body -->
  <rect x="10" y="14" width="28" height="22" rx="3.5" ry="3.5" fill="rgba(255,255,255,0.88)"/>
  <!-- header bar -->
  <rect x="10" y="14" width="28" height="7" rx="3.5" ry="3.5" fill="rgba(255,255,255,0.30)"/>
  <rect x="10" y="17" width="28" height="4" fill="rgba(255,255,255,0.30)"/>
  <!-- binding posts -->
  <rect x="16" y="11" width="3" height="6" rx="1.5" fill="rgba(255,255,255,0.75)"/>
  <rect x="29" y="11" width="3" height="6" rx="1.5" fill="rgba(255,255,255,0.75)"/>
  <!-- checkmark -->
  <polyline points="17,27 22,32 31,21" fill="none" stroke="#34C759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

</svg>